<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    //Search anything on Google 
    <form action="https://www.google.com/search?">
      <label for="search">Search:</label>
      <input type="text" placeholder="Search here" id="search" name="q" />
      // Here q is query of Google.. query help us to connect with back-end //
      So, basically name attribute is necessary and very usefull
      <button>Search</button>
    </form>
  </body>
</html>
