<head>

  <title>Document</title>
  <style>
    table,tr,td{
      border-collapse: separate;
      border: 1px ;
      padding: 100px;
      border-spacing: 4px;
      margin: auto;
    }
  </style>
</head>
  <body>
  <table>
    <tr>
      <td style="background-color: red;"></td>
      <td style="background-color: yellow;"></td>
      <td style="background-color: aqua;" rowspan="2"></td>
    </tr>

    <tr>
      <td style="background-color: blue;" colspan="2"></td>
    </tr>
    <tr>
      <td style="background-color:magenta;" colspan="3"></td>
    </tr>
</table>


  
</body>
